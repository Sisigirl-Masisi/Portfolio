<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
</head>
<body>
    <header class="navbar">
        <div class="navbar-container container">
            <input type="checkbox" name="" id="toggle">
            <div class="hamburger-lines">
                <span class="line line1"></span>
                <span class="line line2"></span>
                <span class="line line3"></span>
            </div>
            <ul class="nav-items">
                <li class="nav-item"><a href="home.html">HOME</a></li>
                <li class="nav-item"><a href="about.html">ABOUT</a></li>
                <li class="nav-item"><a href="skills.html">SKILLS</a></li>
                <li class="nav-item"><a href="projects.html">PROJECTS</a></li>
                <li class="nav-item"><a href="contact.html">CONTACT ME</a></li>
            </ul>
            <h1 class="logo">My Portfolio</h1>
        </div>
    </header>

    <section class="contact">
        <div class="section-heading container"></div>
        <h1>Contact</h1>
        <div class="contact-container container">
            <div class="contact-image">
                <img src="./img/contact-me.jpg" alt="Contact Image">
            </div>
            <form action="#" method="post" class="contact-form">
                <h2>Get in Touch</h2>
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    
    <footer class="footer">
        <p>&copy; 2024 My Portfolio</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
